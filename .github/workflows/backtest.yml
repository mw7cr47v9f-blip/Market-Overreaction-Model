name: Factor backtest (manual)

# Manual, on-demand. Generates oversold events over N years, attaches the five
# candidate metrics, measures 3m/6m forward returns, and writes a bucketed
# summary. INDICATIVE (free data) — see backtest_factor.py caveats.
on:
  workflow_dispatch:
    inputs:
      years:
        description: "Years of history to scan"
        default: "5"
      markets:
        description: "Markets for the yfinance path (blank = ASX and US)"
        default: ""
      source:
        description: "Data source: yfinance (survivor-only) or eodhd (survivorship-free US)"
        default: "yfinance"
        type: choice
        options: ["yfinance", "eodhd"]
      limit:
        description: "Cap tickers processed (eodhd probe). 0 = full universe. Try 300 first to measure ETA."
        default: "0"
      exchanges:
        description: "eodhd venue families to keep (NYSE / NASDAQ / AMEX / ARCA), comma-separated. US only. Default NYSE."
        default: "NYSE"
      market:
        description: "eodhd market. Non-US runs the gated model (no SEC director data). TSE=Tokyo, SGX=Singapore, SEHK=Hong Kong."
        default: "US"
        type: choice
        options: ["US", "ASX", "TSX", "LSE", "TSE", "SGX", "SEHK"]

permissions:
  contents: write

concurrency:
  group: factor-backtest
  cancel-in-progress: false

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Self-test (factor logic)
        run: python -m screener.backtest_factor --self-test
      - name: Run backtest
        env:
          SEC_USER_AGENT: "Market-Overreaction-Backtest research keegancrage@icloud.com"
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        run: python -m screener.backtest_factor --years "${{ inputs.years }}" --markets "${{ inputs.markets }}" --source "${{ inputs.source }}" --limit "${{ inputs.limit }}" --exchanges "${{ inputs.exchanges }}" --market "${{ inputs.market }}" --data-dir data

      - name: Upload events artifact (safety net)
        # Runs even if the backtest or commit fails, so a 30-min run + EODHD quota is
        # NEVER lost to a git hiccup again. Download the CSV straight from the run page.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-events-${{ inputs.market }}-${{ github.run_id }}
          path: |
            data/backtest_events.csv
            data/backtest_summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Commit results
        run: |
          git config user.name  "asx-screen-bot"
          git config user.email "actions@github.com"
          # Keep a market-tagged copy so consecutive market runs don't clobber each other.
          if [ -f data/backtest_events.csv ]; then
            cp data/backtest_events.csv "data/backtest_events_${{ inputs.market }}.csv"; fi
          # Stage EVERYTHING under data/ (not just the tagged file) so the run's other
          # outputs aren't left unstaged — an unstaged file makes `pull --rebase` abort.
          git add -A data
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Factor backtest ${{ inputs.market }} $(date -u +%Y-%m-%d)"
            # --autostash: tuck away any stray unstaged change during the rebase, then
            # reapply — belt-and-suspenders against the "unstaged changes" abort.
            git pull --rebase --autostash origin main
            git push
          fi
